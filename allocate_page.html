<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    padding: 10px 14px 4px 14px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
                 'Helvetica Neue', Arial, sans-serif;
    font-size: 0.8rem;
    color: #1a1a1a;
    background: #ffffff;
  }

  /* ═══════════════════════════════════════════
     MODAL
     ═══════════════════════════════════════════ */
  #modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.35);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }
  #modal-overlay.active { display: flex; }

  #modal-box {
    background: #fffbeb;
    border: 1.5px solid #f59e0b;
    border-radius: 8px;
    padding: 20px 24px 16px 24px;
    max-width: 340px;
    width: 90%;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.18);
  }
  #modal-msg {
    font-size: 0.82rem;
    color: #78350f;
    line-height: 1.55;
    margin-bottom: 14px;
  }
  .modal-ok {
    display: block;
    margin-left: auto;
    padding: 5px 20px;
    background: #f59e0b;
    border: none;
    border-radius: 5px;
    color: #fff;
    font-size: 0.78rem;
    font-family: inherit;
    cursor: pointer;
    font-weight: 600;
  }
  .modal-ok:hover { background: #d97706; }

  /* ═══════════════════════════════════════════
     SECTION: CHAPTER SELECTION
     ═══════════════════════════════════════════ */
  .sel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .sel-title {
    font-size: 0.78rem;
    font-weight: 600;
    color: #374151;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .sel-btns { display: flex; gap: 6px; }
  .sel-btn {
    padding: 3px 10px;
    background: #f0f3f6;
    border: 1px solid #c8d2dc;
    border-radius: 4px;
    font-size: 0.72rem;
    color: #2c3e50;
    cursor: pointer;
    font-family: inherit;
  }
  .sel-btn:hover { background: #dde5ee; }

  /* ═══════════════════════════════════════════
     CHAPTER TILE GRID
     ═══════════════════════════════════════════ */
  .chapter-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    margin-bottom: 12px;
  }
  .chapter-tile {
    padding: 7px 10px;
    border: 1.5px solid #e2e8f0;
    border-radius: 6px;
    cursor: pointer;
    background: #f9fafb;
    transition: border-color 0.12s, background 0.12s;
    user-select: none;
    line-height: 1.4;
    position: relative;
  }
  .chapter-tile:hover { border-color: #93c5fd; background: #eff6ff; }
  .chapter-tile.selected { border-color: #1a1917; background: #f0efec; }

  .tile-num {
    font-size: 0.64rem;
    color: #6b7280;
    margin-bottom: 1px;
    font-weight: 600;
    letter-spacing: 0.04em;
  }
  .tile-title { font-size: 0.72rem; color: #1a1a1a; }

  .chapter-tile.selected .tile-num  { color: #1a1917; }
  .chapter-tile.selected .tile-title { color: #1a1917; font-weight: 500; }

  .tile-check {
    position: absolute;
    top: 6px;
    right: 8px;
    font-size: 0.75rem;
    color: #1a1917;
    display: none;
  }
  .chapter-tile.selected .tile-check { display: block; }

  .divider {
    border: none;
    border-top: 1px solid #e5e7eb;
    margin: 10px 0;
  }

  .generate-row {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 4px;
  }
  .btn-generate {
    padding: 6px 20px;
    background: #2c3e50;
    color: #fff;
    border: none;
    border-radius: 5px;
    font-size: 0.78rem;
    font-family: inherit;
    cursor: pointer;
    font-weight: 500;
    letter-spacing: 0.01em;
  }
  .btn-generate:hover { background: #1a252f; }

  /* ═══════════════════════════════════════════
     MAIN ALLOCATION TABLE
     ═══════════════════════════════════════════ */
  #alloc-table {
    border-collapse: collapse;
    width: 100%;
  }
  #alloc-table thead th {
    background: #2c3e50;
    color: #ffffff;
    padding: 7px 10px;
    text-align: center;
    font-size: 0.63rem;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    white-space: nowrap;
  }
  #alloc-table thead th.left { text-align: left; }

  #alloc-table tbody td {
    padding: 6px 10px;
    text-align: center;
    border-bottom: 1px solid #e8e5e0;
    vertical-align: middle;
  }
  #alloc-table tbody td.left { text-align: left; }
  #alloc-table tbody td.wrap { white-space: normal; }

  #alloc-table tfoot td {
    padding: 7px 10px;
    text-align: center;
    background: #e8f0fe;
    font-weight: 600;
    border-top: 2px solid #b8ccee;
    font-size: 0.78rem;
  }
  #alloc-table tfoot td.left { text-align: left; }

  /* ═══════════════════════════════════════════
     WEIGHT TOGGLE BUTTON
     ═══════════════════════════════════════════ */
  .wt-btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px 2px 5px;
    background: #f0f3f6;
    border: 1px solid #c8d2dc;
    border-radius: 4px;
    font-size: 0.77rem;
    color: #2c3e50;
    cursor: pointer;
    white-space: nowrap;
    font-family: inherit;
    transition: background 0.15s;
    line-height: 1.5;
  }
  .wt-btn:hover { background: #dde5ee; border-color: #a8bfd4; }

  .wt-btn .arr {
    font-size: 0.56rem;
    display: inline-block;
    transition: transform 0.18s;
    color: #7a8fa6;
    line-height: 1;
    flex-shrink: 0;
  }
  .wt-btn.open .arr { transform: rotate(90deg); }

  /* ═══════════════════════════════════════════
     DRAWER ROW
     ═══════════════════════════════════════════ */
  .drawer-cell {
    padding: 0 !important;
    background: #f4f6fa !important;
    border-bottom: 2px solid #c8d2dc !important;
  }
  .drawer-inner { padding: 10px 18px 12px 40px; }

  /* ═══════════════════════════════════════════
     COMPETENCY DETAIL TABLE (inside drawer)
     ═══════════════════════════════════════════ */
  .cmp-table {
    border-collapse: collapse;
    width: 100%;
    font-size: 0.72rem;
  }
  .cmp-table thead th {
    background: transparent;
    color: #6b7280;
    padding: 3px 6px 4px 6px;
    font-size: 0.58rem;
    font-weight: 600;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    border-bottom: 1px solid #d1d5db;
  }
  .cmp-table tbody tr   { border-bottom: 1px solid #e5e7eb; }
  .cmp-table tbody td   { padding: 5px 6px; vertical-align: top; }

  /* ── column headers ── */
  .cmp-seq-h  { text-align: right;  width: 22px; }
  .cmp-code-h { text-align: left;   width: 58px; }
  .cmp-desc-h { text-align: left; }
  .cmp-just-h { text-align: center; }
  .cmp-dots-h { text-align: center; width: 52px; }

  /* ── column cells ── */
  .cmp-seq  { text-align: right; color: #9ca3af; font-size: 0.64rem; width: 22px; }
  .cmp-code {
    font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', monospace;
    font-size: 0.68rem;
    font-weight: 700;
    color: #1a1917;
    white-space: nowrap;
    width: 58px;
  }
  .cmp-desc { text-align: left !important; color: #1a1a1a; line-height: 1.5; }
  .cmp-just {
    text-align: left !important;
    font-style: italic;
    color: #6b7280;
    font-size: 0.66rem;
    line-height: 1.5;
  }
  .cmp-dots { text-align: center; white-space: nowrap; width: 52px; vertical-align: middle; }

  /* ── weight dots ── */
  .dot {
    display: inline-block;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    border: 1.5px solid #374151;
    background: transparent;
    margin: 0 1.5px;
    vertical-align: middle;
  }
  .dot.dot-fill { background: #1a1917; border-color: #1a1917; }

  /* ── drawer tfoot ── */
  .cmp-table tfoot td      { padding: 4px 6px; border-top: 1px solid #d1d5db; font-size: 0.68rem; }
  .cmp-foot-lbl { text-align: right; color: #6b7280; }
  .cmp-foot-val { text-align: center; font-weight: 700; color: #1a1917; }

  .ok   { color: #059669; font-size: 0.74rem; }
  .warn { color: #d97706; font-size: 0.69rem; }

  .no-cmp {
    font-size: 0.71rem;
    color: #9ca3af;
    font-style: italic;
    padding: 4px 0;
  }

  /* ═══════════════════════════════════════════
     EFFORT INDEX PANEL  (Science / Mathematics)
     ═══════════════════════════════════════════ */
  /* Column header note */
  .ei-th .ei-hint {
    display: block;
    font-size: 0.55rem;
    font-weight: 400;
    text-transform: none;
    letter-spacing: 0;
    opacity: 0.75;
    margin-top: 1px;
  }

  /* Cell wrapper — keeps the details element centred */
  .ei-cell { white-space: nowrap; }

  /* <details> element itself is inline-block so it doesn't stretch full cell width */
  .ei-details { display: inline-block; }

  /* <summary> styled like the weight button */
  .ei-val {
    list-style: none;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px 2px 6px;
    background: #eaf2ff;
    border: 1px solid #93bce8;
    border-radius: 4px;
    font-size: 0.77rem;
    color: #1a4480;
    font-weight: 600;
    font-family: inherit;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .ei-val::-webkit-details-marker { display: none; }
  .ei-val::marker { display: none; }
  .ei-val::before {
    content: '\25B6';
    font-size: 0.52rem;
    color: #5a80b0;
    transition: transform 0.18s;
    display: inline-block;
  }
  .ei-details[open] .ei-val::before { transform: rotate(90deg); }
  .ei-val:hover { background: #d6e8ff; border-color: #6fa8dc; }

  /* Expanded breakdown panel — flows inline (no JS, no absolute positioning) */
  .ei-panel {
    display: block;
    margin-top: 6px;
    background: #f8fbff;
    border: 1.5px solid #93bce8;
    border-radius: 6px;
    padding: 8px 10px 6px 10px;
    text-align: left;
    white-space: normal;
    min-width: 290px;
    font-size: 0.7rem;
  }

  /* Breakdown mini-table inside the panel */
  .ei-brkdn {
    border-collapse: collapse;
    width: 100%;
    margin-bottom: 5px;
  }
  .ei-brkdn thead th {
    background: #ddeeff;
    color: #1a4480;
    padding: 3px 7px;
    font-size: 0.6rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    font-weight: 600;
    text-align: center;
    border: 1px solid #aaccee;
  }
  .ei-brkdn thead th:first-child { text-align: left; }
  .ei-brkdn tbody td {
    padding: 3px 7px;
    border: 1px solid #ddeeff;
    text-align: center;
    color: #333;
    font-size: 0.68rem;
  }
  .ei-brkdn tbody td:first-child { text-align: left; color: #444; }
  .ei-brkdn tfoot td {
    padding: 4px 7px;
    border: 1px solid #aaccee;
    background: #ddeeff;
    font-size: 0.7rem;
    font-weight: 700;
    text-align: center;
    color: #1a4480;
  }
  .ei-brkdn tfoot td:first-child { text-align: left; }

  /* Explanatory note below the breakdown table */
  .ei-note {
    font-size: 0.62rem;
    color: #6b7280;
    font-style: italic;
    line-height: 1.45;
  }

  /* ═══════════════════════════════════════════
     FOOTNOTES
     ═══════════════════════════════════════════ */
  .footnotes {
    margin-top: 10px;
    font-size: 0.66rem;
    color: #6b7280;
    line-height: 1.75;
  }

  /* ═══════════════════════════════════════════
     ACTIONS
     ═══════════════════════════════════════════ */
  .actions {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    padding-bottom: 8px;
    align-items: center;
  }
  .btn-clear, .btn-pdf {
    height: 56px;
    min-height: 56px;
    border-radius: 12px;
    background: #2c3e50;
    border: none;
    color: #ffffff;
    font-size: 0.88rem;
    font-weight: 600;
    letter-spacing: 0.02em;
    cursor: pointer;
    padding: 0 1.5rem;
    box-shadow: 0 2px 8px rgba(0,0,0,0.18);
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    transition: background 0.15s, box-shadow 0.15s;
    font-family: inherit;
  }
  .btn-clear:hover, .btn-pdf:hover {
    background: #3d5166;
    box-shadow: 0 4px 14px rgba(0,0,0,0.24);
  }
  .btn-clear::before {
    content: "✦";
    font-size: 0.85rem;
  }
  .btn-pdf::before {
    content: "✦";
    font-size: 0.85rem;
  }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
</head>
<body>

<!-- ═══ MODAL ═══════════════════════════════════════════════════════════════ -->
<div id="modal-overlay">
  <div id="modal-box">
    <p id="modal-msg"></p>
    <button class="modal-ok" onclick="closeModal()">OK</button>
  </div>
</div>

<!-- ═══ SECTION: CHAPTER SELECTION ════════════════════════════════════════ -->
<div id="section-select">
  <div class="sel-header">
    <span class="sel-title">Chapter Selection</span>
    <div class="sel-btns">
      <button class="sel-btn" onclick="selectAll()">Select All</button>
      <button class="sel-btn" onclick="deselectAll()">Deselect All</button>
    </div>
  </div>
  <div class="chapter-grid" id="chapter-grid"></div>
  <hr class="divider">
  <div class="generate-row">
    <button class="btn-generate" onclick="generateReport()">Generate Allocation Report</button>
  </div>
</div>

<!-- ═══ SECTION: REPORT ═════════════════════════════════════════════════════ -->
<div id="section-report" style="display:none">
  <div id="root"></div>
  <div class="footnotes">
    <p id="fn1">Periods allocated using the Largest Remainder Method (LRM), weighted by chapter competency load (W3&nbsp;&times;&nbsp;3&nbsp;+&nbsp;W2&nbsp;&times;&nbsp;2&nbsp;+&nbsp;W1&nbsp;&times;&nbsp;1).</p>
    <p id="fn2"></p>
  </div>
  <div class="actions">
    <button class="btn-pdf" onclick="downloadPDF()">Download PDF</button>
    <button class="btn-clear" onclick="clearReport()">Clear</button>
  </div>
</div>

<script>
/* __CHAPTERS_DATA__ */

/* ── LRM algorithm ──────────────────────────────────────────────────────── */
function _lrm(rawFloats, total) {
  var floors = rawFloats.map(function (f) { return Math.floor(f); });
  var rems   = rawFloats.map(function (f, i) { return { i: i, r: f - Math.floor(f) }; });
  rems.sort(function (a, b) { return b.r - a.r; });
  var deficit = total - floors.reduce(function (s, v) { return s + v; }, 0);
  var result  = floors.slice();
  for (var k = 0; k < deficit; k++) result[rems[k].i]++;
  return result;
}

function _chapterWeight(cd) {
  /* Science / Mathematics: use effort_index as the allocation driver */
  if (IS_SCIENCE) return (typeof cd.effort_index === 'number' && cd.effort_index > 0) ? cd.effort_index : 0;
  return cd.chapter_weight || 0;
}

function _computeAllocation(selNums) {
  /* preserve CHAPTERS_DATA display order */
  var orderedChapters = [];
  CHAPTERS_DATA.forEach(function (cd) {
    if (selNums.indexOf(cd.chapter_number) >= 0) orderedChapters.push(cd);
  });

  var weights     = orderedChapters.map(_chapterWeight);
  var totalWeight = weights.reduce(function (s, w) { return s + w; }, 0);

  var results = orderedChapters.map(function (cd) {
    return { chapter_number: cd.chapter_number, total: 0 };
  });

  PERIOD_TYPES.forEach(function (pt) {
    if (orderedChapters.length === 0) return;

    var allotted;
    if (orderedChapters.length === 1) {
      allotted = [pt.count];
    } else if (totalWeight === 0) {
      var even = Math.floor(pt.count / orderedChapters.length);
      var rem  = pt.count % orderedChapters.length;
      allotted = orderedChapters.map(function (_, i) { return even + (i < rem ? 1 : 0); });
    } else {
      var rawFloats = weights.map(function (w) { return (w / totalWeight) * pt.count; });
      allotted = _lrm(rawFloats, pt.count);
    }

    allotted.forEach(function (n, i) {
      results[i][String(pt.mins)] = n;
      results[i].total += n;
    });
  });

  return results;
}

/* ── tiny helpers ───────────────────────────────────────────────────────── */
function pad2(n) { return String(n).padStart(2, '0'); }
function esc(s) {
  return String(s || '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
function fmtTime(m) {
  var h = Math.floor(m / 60), r = m % 60;
  return h > 0 ? h + 'h\u00a0' + r + 'min' : r + '\u00a0min';
}

/* ── selection state ────────────────────────────────────────────────────── */
var selected       = new Set();
var reportGenerated = false;

/* ── chapter tile grid ──────────────────────────────────────────────────── */
function renderChapterGrid() {
  var grid = document.getElementById('chapter-grid');
  var html = '';
  CHAPTERS_DATA.forEach(function (cd) {
    var isSel = selected.has(cd.chapter_number);
    html +=
      '<div id="tile-' + cd.chapter_number + '"'
      + ' class="chapter-tile' + (isSel ? ' selected' : '') + '"'
      + ' onclick="toggleTile(' + cd.chapter_number + ')">'
      + '<span class="tile-check">&#10003;</span>'
      + '<div class="tile-num">Ch\u00a0' + pad2(cd.chapter_number) + '</div>'
      + '<div class="tile-title">' + esc(cd.chapter_title) + '</div>'
      + '</div>';
  });
  grid.innerHTML = html;
}

function toggleTile(num) {
  var el = document.getElementById('tile-' + num);
  if (!el) return;
  if (selected.has(num)) {
    selected.delete(num);
    el.classList.remove('selected');
  } else {
    selected.add(num);
    el.classList.add('selected');
  }
}

function selectAll() {
  CHAPTERS_DATA.forEach(function (cd) {
    selected.add(cd.chapter_number);
    var el = document.getElementById('tile-' + cd.chapter_number);
    if (el) el.classList.add('selected');
  });
}

function deselectAll() {
  selected.clear();
  CHAPTERS_DATA.forEach(function (cd) {
    var el = document.getElementById('tile-' + cd.chapter_number);
    if (el) el.classList.remove('selected');
  });
}

/* ── modal ──────────────────────────────────────────────────────────────── */
function openModal(msg) {
  document.getElementById('modal-msg').textContent = msg;
  document.getElementById('modal-overlay').classList.add('active');
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('active');
}

/* ── generate report ────────────────────────────────────────────────────── */
function generateReport() {
  if (selected.size === 0) {
    openModal('Please select at least one chapter before generating.');
    return;
  }
  if (!PERIOD_TYPES || PERIOD_TYPES.length === 0) {
    openModal('Please configure at least one period type in the sidebar.');
    return;
  }

  /* sorted numerically so table rows are in chapter order */
  var selNums = [];
  selected.forEach(function (n) { selNums.push(n); });
  selNums.sort(function (a, b) { return a - b; });

  var allocResults = _computeAllocation(selNums);
  var allocMap     = {};
  allocResults.forEach(function (r) { allocMap[r.chapter_number] = r; });

  var sortedPts = PERIOD_TYPES.slice().sort(function (a, b) { return b.mins - a.mins; });

  /* filter CHAPTERS_DATA to selected, preserving display order */
  var selChapters = CHAPTERS_DATA.filter(function (cd) {
    return selected.has(cd.chapter_number);
  });

  var nPtCols   = sortedPts.length;
  var totalCols = 5 + nPtCols;

  var grandPeriods = 0, grandMinutes = 0;
  var colSums = {};
  sortedPts.forEach(function (pt) { colSums[pt.mins] = 0; });

  /* ── build body rows ── */
  var bodyHTML = '';
  selChapters.forEach(function (cd, idx) {
    var primary = Array.isArray(cd.primary) ? cd.primary : [];
    var wt      = _chapterWeight(cd);
    var alloc   = allocMap[cd.chapter_number] || {};
    var total   = alloc.total || 0;
    var minutes = sortedPts.reduce(function (s, pt) {
      return s + (alloc[String(pt.mins)] || 0) * pt.mins;
    }, 0);

    grandPeriods += total;
    grandMinutes += minutes;
    sortedPts.forEach(function (pt) { colSums[pt.mins] += (alloc[String(pt.mins)] || 0); });

    var rowBg = idx % 2 === 0 ? '#f9f8f6' : '#ffffff';
    bodyHTML += '<tr style="background:' + rowBg + '">';
    bodyHTML += '<td>' + pad2(cd.chapter_number) + '</td>';
    bodyHTML += '<td class="left wrap">' + esc(cd.chapter_title) + '</td>';
    /* ── third column: Effort Index (Science/Maths) or Weight button (others) ── */
    if (IS_SCIENCE) {
      /* ── Science / Mathematics: effort index with inline breakdown panel ── */
      var ei = (typeof cd.effort_index === 'number' && cd.effort_index > 0) ? cd.effort_index : 0;
      if (!ei) {
        /* Missing or zero effort index: show placeholder, no drill-down */
        bodyHTML += '<td class="ei-cell">&#8212;</td>';
      } else {
        var cdVal  = cd.conceptual_demand || 0;
        var acVal  = cd.activity_count    || 0;
        var dcVal  = cd.demo_count        || 0;
        var elVal  = cd.exec_load         || 0;
        var cdCont = (cdVal * 2).toFixed(1);

        var elCont = (elVal * 2).toFixed(1);
        bodyHTML +=
          '<td class="ei-cell">'
          + '<details class="ei-details">'
          + '<summary class="ei-val">' + ei + '</summary>'

          + '<table class="ei-brkdn">'
          + '<thead><tr>'
          + '<th>Signal</th><th>Value</th><th>Mult.</th><th>Contribution</th>'
          + '</tr></thead>'
          + '<tbody>'
          + '<tr><td>Conceptual demand</td><td>' + cdVal + '</td><td>\u00d72</td><td>' + cdCont + '</td></tr>'
          + '<tr><td>Student activities</td><td>' + acVal + '</td><td>\u00d71</td><td>' + acCont + '</td></tr>'
          + '<tr><td>Teacher demos</td><td>'      + dcVal + '</td><td>\u00d71.5</td><td>' + dcCont + '</td></tr>'
          + '<tr><td>Exercise load</td><td>'      + elVal + '</td><td>\u00d72</td><td>' + elCont + '</td></tr>'
          + '</tbody>'
          + '<tfoot><tr>'
          + '<td colspan="3"><strong>Effort Index</strong></td>'
          + '<td><strong>' + ei + '</strong></td>'
          + '</tr></tfoot>'
          + '</table>'
          + '<p class="ei-note">Higher effort index\u00a0= more classroom time needed. '
          + 'Allocation is proportional to effort index across all chapters '
          + 'using the Largest Remainder Method.</p>'
          + '</div>'
          + '</details>'
          + '</td>';
      }
      /* No competency drawer for Science/Mathematics chapters */
    } else {
      /* ── Social Sciences / Languages: weight button opens competency drawer ── */
      bodyHTML += '<td>'
        + '<button class="wt-btn" onclick="toggleDrawer(' + cd.chapter_number + ',this)">'
        + '<span class="arr">&#9658;</span>' + wt

    }

    sortedPts.forEach(function (pt) {
      bodyHTML += '<td>' + (alloc[String(pt.mins)] || 0) + '</td>';
    });
    bodyHTML += '<td>' + total   + '</td>';
    bodyHTML += '<td>' + minutes + '</td>';
    bodyHTML += '</tr>';

    /* ── competency drawer row (Social Sciences / Languages only) ── */
    if (!IS_SCIENCE) {
      var drawerWt = 0, cmpRowsHTML = '';
      primary.forEach(function (comp, ci) {
        var w = comp.weight || 0;
        drawerWt += w;
        /* three dot positions: filled then empty */
        var dots = '';
        for (var d = 0; d < 3; d++) {
          dots += '<span class="dot' + (d < w ? ' dot-fill' : '') + '"></span>';
        }
        cmpRowsHTML +=
          '<tr>'
          + '<td class="cmp-seq">'  + (ci + 1)                                  + '</td>'
          + '<td class="cmp-code">' + esc(comp.c_code       || '')               + '</td>'
          + '<td class="cmp-desc">' + esc(comp.description  || comp.cg || '')    + '</td>'
          + '<td class="cmp-just">' + esc(comp.justification || '')               + '</td>'
          + '<td class="cmp-dots">' + dots                                        + '</td>'
          + '</tr>';
      });

      var wtCheck = (drawerWt === wt)
        ? ' <span class="ok">&#10003;</span>'
        : ' <span class="warn">&#9888;\u00a0' + drawerWt + '</span>';

      var drawerContent;
      if (primary.length === 0) {
        drawerContent = '<p class="no-cmp">No primary competency entries found in mapping.</p>';
      } else {
        drawerContent =
          '<table class="cmp-table">'
          + '<thead><tr>'
          + '<th class="cmp-seq-h">#</th>'
          + '<th class="cmp-code-h">Code</th>'
          + '<th class="cmp-desc-h">Competency</th>'
          + '<th class="cmp-just-h">Justification</th>'
          + '<th class="cmp-dots-h">Weight</th>'
          + '</tr></thead>'
          + '<tbody>' + cmpRowsHTML + '</tbody>'
          + '<tfoot><tr>'
          + '<td colspan="4" class="cmp-foot-lbl">Total chapter weight</td>'
          + '<td class="cmp-foot-val"><strong>' + wt + '</strong>' + wtCheck + '</td>'
          + '</tr></tfoot>'
          + '</table>';
      }

      bodyHTML +=
        '<tr id="dr-' + cd.chapter_number + '" class="drawer-row" style="display:none">'
        + '<td colspan="' + totalCols + '" class="drawer-cell">'
        + '<div class="drawer-inner">' + drawerContent + '</div>'
        + '</td></tr>';
    }
  });

  /* ── tfoot totals row ── */
  var footHTML = '<tfoot><tr>';
  footHTML += '<td>&#8212;</td>';
  footHTML += '<td class="left"><strong>Total</strong></td>';
  footHTML += '<td></td>';
  sortedPts.forEach(function (pt) {
    footHTML += '<td><strong>' + colSums[pt.mins] + '</strong></td>';
  });

  footHTML += '<td><strong>' + grandMinutes + '</strong></td>';
  footHTML += '</tr></tfoot>';

  /* ── thead ── */
  var headHTML = '<thead><tr>';
  headHTML += '<th>#</th>';
  headHTML += '<th class="left">Chapter</th>';
  if (IS_SCIENCE) {
    /* Science / Mathematics: single Effort Index column replaces Weight */
    headHTML += '<th class="ei-th">Effort Index<span class="ei-hint">(click value to expand)</span></th>';
  } else {
    /* Social Sciences / Languages: competency-load weight column */
    headHTML += '<th>Weight</th>';
  }
  sortedPts.forEach(function (pt) { headHTML += '<th>' + pt.mins + '-min</th>'; });
  headHTML += '<th>Total</th>';
  headHTML += '<th>Minutes</th>';
  headHTML += '</tr></thead>';

  /* ── inject into #root ── */
  document.getElementById('root').innerHTML =
    '<table id="alloc-table">'
    + headHTML
    + '<tbody>' + bodyHTML + '</tbody>'
    + footHTML
    + '</table>';

  /* ── footnote #fn2 ── */
  var fn2 = document.getElementById('fn2');
  if (fn2) {
    fn2.textContent =
      'Budget:\u00a0' + grandPeriods + '\u00a0periods\u00a0\u00b7\u00a0'
      + fmtTime(grandMinutes)
      + '\u00a0\u00b7\u00a0' + (GRADE_LABEL   || '')
      + '\u00a0\u00b7\u00a0' + (SUBJECT_LABEL || '');
  }

  /* ── footnote #fn1: wording depends on subject group ── */
  var fn1El = document.getElementById('fn1');
  if (fn1El) {
    fn1El.innerHTML = IS_SCIENCE
      ? 'Periods allocation is proportional to the chapter effort index, an indicator of the complexity of the chapter being taught. Click the Effort index number above to access the details of Effort index for each chapter'
      : 'Periods allocated using the Largest Remainder Method (LRM), weighted by chapter competency load'
        + ' (W3\u00a0\u00d7\u00a03\u00a0+\u00a0W2\u00a0\u00d7\u00a02\u00a0+\u00a0W1\u00a0\u00d7\u00a01).';
  }

  /* ── switch sections ── */
  document.getElementById('section-select').style.display = 'none';
  document.getElementById('section-report').style.display = '';
  reportGenerated = true;

  // Notify Streamlit of selection via URL — delayed so report renders first
  const chNums = Array.from(selected).sort((a,b) => a-b).join(',');
  const ptStr = PERIOD_TYPES.map(pt => pt.mins + 'x' + pt.count).join(',');
  const newUrl = '?role=Allocate&alloc_chs=' + chNums + '&alloc_pts=' + ptStr;
  setTimeout(function() {
    window.parent.history.replaceState(null, '', newUrl);
    // Force Streamlit rerun by fetching its heartbeat endpoint
    fetch('/healthz').catch(function(){});
    // Fallback: dispatch a popstate event so Streamlit detects the URL change
    window.parent.dispatchEvent(new PopStateEvent('popstate', { state: null }));
  }, 300);
}

/* ── clear report ───────────────────────────────────────────────────────── */
function clearReport() {
  document.getElementById('section-report').style.display = 'none';
  document.getElementById('root').innerHTML = '';
  document.getElementById('section-select').style.display = '';
  selected.clear();
  renderChapterGrid();
  reportGenerated = false;
  window.parent.history.replaceState(null, '', '?role=Allocate');
}

      /* Fix: Unicode symbols common in science/maths content that Helvetica cannot render */

  var allocResults = _computeAllocation(selNums);

  addHeader();
  var y = mTop + 14;

  var ptBreak = sortedPts.map(function (pt) {

  var summaryMetricLbl = IS_SCIENCE ? 'Sum of effort idx' : 'Total weight';

        /* Fix: set each column's exact render font before splitTextToSize so line-break
           metrics match render metrics — prevents spacing drift on any line of any row */
        doc.setFont('helvetica', 'normal'); doc.setFontSize(6.5);
        var descLines = doc.splitTextToSize(descText, sciCW.desc - CP * 2);
        doc.setFont('helvetica', 'italic'); doc.setFontSize(7);
        var justLines = doc.splitTextToSize(justText, sciCW.just - CP * 2);
        var rowH      = Math.max(8, Math.max(descLines.length, justLines.length) * 3.6 + CP * 2);

        if (y + rowH > pageH - mBot) { doc.addPage(); addHeader(); y = mTop + 8; }

        var midY  = y + rowH / 2;
        var sciCx = mL;

        /* # col */
        doc.setFont('helvetica', 'normal'); doc.setFontSize(6); doc.setTextColor(40, 40, 40);
        doc.text(String(ci + 1), sciCx + sciCW.seq - CP, midY, { align: 'right', baseline: 'middle' });
        doc.setCharSpace(0);
        sciCx += sciCW.seq;

        /* Code col */
        doc.setFont('helvetica', 'bold'); doc.setFontSize(6.5); doc.setTextColor(26, 25, 23);
        doc.text(comp.c_code || '', sciCx + CP, midY, { baseline: 'middle' });
        doc.setCharSpace(0);
        sciCx += sciCW.code;

        /* Competency col */
        doc.setFont('helvetica', 'normal'); doc.setFontSize(6.5); doc.setTextColor(26, 25, 23);
        doc.text(descLines, sciCx + CP, y + CP, { lineHeightFactor: 1.3 });
        doc.setCharSpace(0);
        sciCx += sciCW.desc;

        /* Justification col — Change 2.3: 1pt larger (7pt), 1 notch darker (35,35,35) */
        /* Change 2.8: reset font state to normal before setting italic, mirrors Social Sciences garbling fix */
        doc.setFont('helvetica', 'normal'); doc.setFontSize(7); doc.setTextColor(35, 35, 35);
        doc.setFont('helvetica', 'italic');
        doc.text(justLines, sciCx + CP, y + CP, { lineHeightFactor: 1.3 });
        doc.setCharSpace(0);

        y += rowH;
        rule(y, 0.1, 220);
      });

      /* effort index summary line — Change 2.4: whole row 1pt larger + 1 notch darker */
      /* Change 2.5: "Effort index: N" alone rendered bold, 2pt larger, 2 notches darker */
      var ei = cd.effort_index || 0;
      var eiPart1 = ei ? ('Effort index: ' + ei) : 'Effort index: not yet computed';
      /* Change 2.5: bold, 9.5pt (row 7.5 + 2), colour (45,45,45) — 2 notches darker than baseline */
      doc.setFont('helvetica', 'bold'); doc.setFontSize(9.5); doc.setTextColor(45, 45, 45);
      var _eiPart1Width = doc.getTextWidth(eiPart1);
      doc.text(eiPart1, mL, y + 3);
      doc.setCharSpace(0);
      if (ei) {
        /* Change 2.4: rest of row — normal, 7.5pt (6.5+1), colour (95,95,95) — 1 notch darker */
        var eiSuffix = '  Conceptual demand: ' + (cd.conceptual_demand || 0)
            + '  Activities: ' + (cd.activity_count || 0)
            + '  Demos: '      + (cd.demo_count    || 0)
            + '  Exec load: '  + (cd.exec_load     || 0);
        doc.setFont('helvetica', 'normal'); doc.setFontSize(7.5); doc.setTextColor(95, 95, 95);
        doc.text(eiSuffix, mL + _eiPart1Width, y + 3);
        doc.setCharSpace(0);
      }
      y += 7;

      /* thin separator between chapters */
      rule(y, 0.18, 220); y += 4;

    } else {
      /* ── Social Sciences format: 5-column competency table ── */
      /* competency column headers */
      var hx = mL;
      var headers = ['#', 'Code', 'Competency', 'Justification', 'Weight'];
      var hWidths = [CW.seq, CW.code, CW.desc, CW.just, CW.dots];
      var hAligns = ['right', 'left', 'center', 'center', 'center'];
      doc.setFont('helvetica', 'bold'); doc.setFontSize(5.5); doc.setTextColor(107, 114, 128);
      headers.forEach(function (h, i) {
        doc.setCharSpace(0);
        if (hAligns[i] === 'right') {
          doc.text(h, hx + hWidths[i] - CP, y, { align: 'right' });
          doc.setCharSpace(0);
        } else if (hAligns[i] === 'center') {
          doc.text(h, hx + hWidths[i] / 2, y, { align: 'center' });
          doc.setCharSpace(0);
        } else {
          doc.text(h, hx + CP, y);
          doc.setCharSpace(0);
        }
        hx += hWidths[i];
      });
      y += 2; rule(y, 0.1, 210); y += 3;

      /* competency rows — Fix 2: use CP padding; Fix 3: explicit font per cell */
      primary.forEach(function (comp, ci) {
        var w         = comp.weight || 0;
        var descText  = cleanText(comp.description || comp.cg || '');
        var justText  = cleanText(comp.justification || '');
        var descLines = doc.splitTextToSize(descText, CW.desc - CP * 2);
        var justLines = doc.splitTextToSize(justText, CW.just - CP * 2);
        var rowH      = Math.max(8, Math.max(descLines.length, justLines.length) * 3.6 + CP * 2);

        if (y + rowH > pageH - mBot) { doc.addPage(); addHeader(); y = mTop + 8; }

        var midY = y + rowH / 2;
        var cx   = mL;

        /* # col — Fix 3: normal font explicitly */
        doc.setFont('helvetica', 'normal'); doc.setFontSize(6); doc.setTextColor(40, 40, 40);
        doc.text(String(ci + 1), cx + CW.seq - CP, midY, { align: 'right', baseline: 'middle' });
        doc.setCharSpace(0);
        cx += CW.seq;

        /* Code col — Fix 3: normal then bold */
        doc.setFont('helvetica', 'normal'); doc.setFontSize(6.5); doc.setTextColor(26, 25, 23);
        doc.setFont('helvetica', 'bold');
        doc.text(comp.c_code || '', cx + CP, midY, { baseline: 'middle' });
        doc.setCharSpace(0);
        cx += CW.code;

        /* Competency col — Fix 3: normal */
        doc.setFont('helvetica', 'normal'); doc.setFontSize(6.5); doc.setTextColor(26, 25, 23);
        doc.text(descLines, cx + CP, y + CP, { lineHeightFactor: 1.3 });
        doc.setCharSpace(0);
        cx += CW.desc;

        /* Justification col — Fix 3: italic + (60,60,60) */
        doc.setFont('helvetica', 'normal'); doc.setFontSize(6); doc.setTextColor(60, 60, 60);
        doc.setFont('helvetica', 'italic');
        doc.text(justLines, cx + CP, y + CP, { lineHeightFactor: 1.3 });
        doc.setCharSpace(0);
        cx += CW.just;

        /* Dots col — Fix 4: drawDots with cell coords */
        drawDots(cx, y, rowH, w);

        y += rowH;
        rule(y, 0.1, 220); /* hairline between rows */
      });

      y += 4;
    }
  });

  /* Change 2.7: footnote text rendering removed — both footnotes deleted from last page */

  /* ── add footers to all pages ── */
  var totalPages = doc.internal.getNumberOfPages();
  for (var p = 1; p <= totalPages; p++) addFooter(p, totalPages);

  doc.save('Aruvi_Allocation_' + dateStr + '.pdf');
}

/* ── drawer toggle — global, called from onclick ────────────────────────── */
function toggleDrawer(chNum, btn) {
  var row = document.getElementById('dr-' + chNum);
  if (!row) return;
  var isOpen = row.style.display !== 'none';
  row.style.display = isOpen ? 'none' : 'table-row';
  if (btn) btn.classList.toggle('open', !isOpen);
}

/* ── initialise ─────────────────────────────────────────────────────────── */
renderChapterGrid();
</script>
